name: Daily mobile game news

on:
  schedule:
    # 23:00 UTC is 07:00 in Asia/Shanghai.
    - cron: "0 23 * * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      range:
        description: "采集范围"
        required: true
        default: "since_yesterday"
        type: choice
        options:
          - since_yesterday
          - yesterday

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect yesterday's news
        if: github.event_name == 'schedule'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_TRANSLATION_MODEL: gpt-4.1-mini
        run: python scripts/collect.py --yesterday --translate --retention-days 7 --limit 120

      - name: Manual collect from yesterday 00:00 to now
        if: github.event_name == 'workflow_dispatch' && inputs.range == 'since_yesterday'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_TRANSLATION_MODEL: gpt-4.1-mini
        run: python scripts/collect.py --since-yesterday --translate --retention-days 7 --limit 120

      - name: Manual collect yesterday only
        if: github.event_name == 'workflow_dispatch' && inputs.range == 'yesterday'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_TRANSLATION_MODEL: gpt-4.1-mini
        run: python scripts/collect.py --yesterday --translate --retention-days 7 --limit 120

      - name: Commit updated data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/news.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update daily mobile game news"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
